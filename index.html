<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Greenhouse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h1>🌱 IoT Greenhouse</h1>
  <p class="status">
    Status: <span id="connStatus" style="color: orange;">Connecting...</span>
  </p>
</header>

<main class="container">

  <!-- ================= MONITORING ================= -->
  <section class="grid">

    <div class="card">
      <h3>🌡 Suhu</h3>
      <p class="big" id="temp">-</p>
    </div>

    <div class="card">
      <h3>💡 Intensitas Lampu</h3>

      <p class="big">
        <span id="light">-</span>%
      </p>

      <div class="bar">
        <div class="fill" id="lightBar" style="width:0%"></div>
      </div>
    </div>

  </section>

  <!-- ================= CHART PLACEHOLDER ================= -->
  <section class="card full">
    <h3>📊 Suhu Realtime</h3>
    <div class="chart-placeholder">Chart Area (Realtime Temperature)</div>
  </section>

  <section class="card full">
    <h3>📊 History Intensitas</h3>
    <div class="chart-placeholder">Chart Area (Usage History)</div>
  </section>

  <!-- ================= CONTROL ================= -->
  <section class="grid">

    <div class="card">
      <h3>🚨 Emergency Control</h3>

      <button id="btnOn" class="btn on">ON</button>
      <button id="btnOff" class="btn off">OFF</button>

      <p>Light Status: <span id="lampStatus">-</span></p>
    </div>

    <div class="card">
      <h3>🎚 Dimming Control</h3>

      <input id="dimmer" type="range" min="0" max="100" value="0">

      <div class="input-group">
        <input id="dimmerInput" type="number" min="0" max="100" value="0">
        <span>%</span>
      </div>

      <p>Current: <span id="dimmerValue">0</span>%</p>
    </div>

  </section>

</main>

<!-- WAJIB MODULE -->
<script type="module" src="js/app.js"></script>

</body>
</html>
