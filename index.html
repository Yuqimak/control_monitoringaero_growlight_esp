<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Greenhouse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h1>🌱 IoT Greenhouse</h1>
  <p class="status">Status: <span id="connStatus">Online</span></p>
</header>

<main class="container">

  <!-- MONITORING -->
  <section class="grid">

    <div class="card">
      <h3>🌡 Suhu</h3>
      <p class="big" id="temp">28°C</p>
    </div>

    <div class="card">
      <h3>💡 Intensitas</h3>
      <p class="big" id="light">75%</p>
      <div class="bar">
        <div class="fill" style="width:75%"></div>
      </div>
    </div>

  </section>

  <!-- CHART PLACEHOLDER -->
  <section class="card full">
    <h3>📊 Suhu Realtime</h3>
    <div class="chart-placeholder">Chart Area</div>
  </section>

  <section class="card full">
    <h3>📊 History Intensitas</h3>
    <div class="chart-placeholder">Chart Area</div>
  </section>

  <!-- CONTROL -->
  <section class="grid">

    <div class="card">
      <h3>🚨 Emergency</h3>
      <button class="btn off">OFF</button>
      <button class="btn on">ON</button>
    </div>

    <div class="card">
      <h3>🎚 Dimming</h3>
      <input type="range" min="0" max="100" value="75">
      <p>75%</p>
    </div>

  </section>

</main>

</body>
</html>
